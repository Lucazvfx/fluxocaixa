services:
  - type: web
    name: fluxo-caixa
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bovi-ml-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: fluxo-caixa-db