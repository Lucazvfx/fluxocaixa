services:
  - type: web
    name: fluxocaixa
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: /bin/sh -c "/opt/render/project/src/.venv/bin/gunicorn app:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fluxocaixa-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true